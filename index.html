<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thoughts Crest - Password Reset</title>
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #1e293b;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }
        
        /* Animated Background */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            z-index: -2;
        }
        
        /* Floating Elements */
        .floating-shapes {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
        }
        
        .shape {
            position: absolute;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            animation: float 6s ease-in-out infinite;
        }
        
        .shape:nth-child(1) {
            width: 80px;
            height: 80px;
            top: 10%;
            left: 10%;
            animation-delay: 0s;
        }
        
        .shape:nth-child(2) {
            width: 120px;
            height: 120px;
            top: 70%;
            right: 10%;
            animation-delay: 2s;
        }
        
        .shape:nth-child(3) {
            width: 60px;
            height: 60px;
            bottom: 20%;
            left: 30%;
            animation-delay: 4s;
        }
        
        .shape:nth-child(4) {
            width: 100px;
            height: 100px;
            top: 30%;
            right: 30%;
            animation-delay: 1s;
        }
        
        .shape:nth-child(5) {
            width: 40px;
            height: 40px;
            bottom: 10%;
            right: 20%;
            animation-delay: 3s;
        }
        
        @keyframes float {
            0%, 100% { 
                transform: translateY(0px) rotate(0deg); 
                opacity: 0.7;
            }
            50% { 
                transform: translateY(-20px) rotate(180deg); 
                opacity: 0.3;
            }
        }
        
        .container {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 16px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
            padding: 3rem;
            max-width: 450px;
            width: 100%;
            text-align: center;
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
            animation: slideUp 0.6s ease-out;
        }
        
        .container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, #2563eb, #f59e0b, #2563eb);
            background-size: 200% 100%;
            animation: shimmer 3s ease-in-out infinite;
        }
        
        @keyframes shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }
        
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .container:hover {
            transform: translateY(-5px);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
        }
        
        .logo {
            text-align: center;
            margin-bottom: 2.5rem;
            position: relative;
        }
        
        .logo img {
            width: 100px;
            height: 100px;
            border-radius: 12px;
            margin-bottom: 1.5rem;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            transition: all 0.3s ease;
            border: 3px solid rgba(255, 255, 255, 0.2);
            display: block;
            margin-left: auto;
            margin-right: auto;
            object-fit: cover;
        }
        
        .logo img:hover {
            transform: scale(1.05) rotate(5deg);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
        }
        
        .logo h1 {
            font-size: 2.5rem;
            font-weight: 800;
            margin-bottom: 0.5rem;
            letter-spacing: -0.02em;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 0.25rem;
        }
        
        .thoughts-text {
            color: #FFB366;
            background: linear-gradient(135deg, #FFB366, #FF9966);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .crest-text {
            color: #D3D3D3;
            background: linear-gradient(135deg, #D3D3D3, #B8B8B8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .logo p {
            color: #64748b;
            font-size: 1rem;
            font-weight: 500;
            letter-spacing: 0.02em;
        }
        
        .form {
            margin-bottom: 2rem;
        }
        
        .form h2 {
            font-size: 1.75rem;
            font-weight: 700;
            color: #1e293b;
            margin-bottom: 1rem;
            text-align: center;
            position: relative;
        }
        
        .form h2::after {
            content: '';
            position: absolute;
            bottom: -0.5rem;
            left: 50%;
            transform: translateX(-50%);
            width: 60px;
            height: 3px;
            background: linear-gradient(90deg, #2563eb, #f59e0b);
            border-radius: 0.5rem;
        }
        
        .form-group {
            margin-bottom: 1.5rem;
            text-align: left;
            position: relative;
        }
        
        .form-label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
            color: #1e293b;
            font-size: 0.875rem;
            letter-spacing: 0.02em;
        }
        
        .form-input {
            width: 100%;
            padding: 1rem 1.25rem;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            font-size: 1rem;
            background: rgba(255, 255, 255, 0.8);
            color: #1e293b;
            transition: all 0.3s ease;
            outline: none;
            font-weight: 500;
        }
        
        .form-input::placeholder {
            color: #94a3b8;
            font-weight: 400;
        }
        
        .form-input:focus {
            border-color: #2563eb;
            background: rgba(255, 255, 255, 0.95);
            box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1);
            transform: translateY(-2px);
        }
        
        .form-input:hover {
            border-color: #3b82f6;
        }
        
        .btn {
            width: 100%;
            padding: 1rem 1.5rem;
            background: linear-gradient(135deg, #2563eb, #1e40af);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }
        
        .btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transition: left 0.5s;
        }
        
        .btn:hover::before {
            left: 100%;
        }
        
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            background: linear-gradient(135deg, #3b82f6, #2563eb);
        }
        
        .btn:active {
            transform: translateY(0);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }
        
        .btn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }
        
        .success-message {
            background: linear-gradient(135deg, rgba(16, 185, 129, 0.1), rgba(34, 197, 94, 0.1));
            border: 1px solid rgba(16, 185, 129, 0.3);
            color: #10b981;
            padding: 1.25rem;
            border-radius: 12px;
            margin-bottom: 1.5rem;
            font-size: 0.9rem;
            font-weight: 500;
            animation: slideIn 0.5s ease-out;
            text-align: center;
            backdrop-filter: blur(10px);
        }
        
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .status {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            padding: 1rem;
            margin-top: 1rem;
            font-size: 0.875rem;
            text-align: left;
        }
        
        .status-item {
            display: flex;
            align-items: center;
            margin-bottom: 0.5rem;
        }
        
        .status-item:last-child {
            margin-bottom: 0;
        }
        
        .status-icon {
            margin-right: 0.5rem;
        }
        
        /* Responsive Design */
        @media (max-width: 480px) {
            .container {
                padding: 2rem;
                margin: 10px;
                max-width: 100%;
            }
            
            .logo h1 {
                font-size: 2rem;
            }
            
            .form h2 {
                font-size: 1.5rem;
            }
            
            .logo img {
                width: 80px;
                height: 80px;
            }
        }
    </style>
</head>
<body>
    <!-- Floating Background Elements -->
    <div class="floating-shapes">
        <div class="shape"></div>
        <div class="shape"></div>
        <div class="shape"></div>
        <div class="shape"></div>
        <div class="shape"></div>
    </div>

    <div class="container">
        <div class="logo">
            <img src="/TC.jpg" alt="Thoughts Crest Logo" onerror="this.style.display='none'">
            <h1>
                <span class="thoughts-text">Thoughts</span>
                <span class="crest-text"> Crest</span>
            </h1>
            <p>Password Reset Service</p>
        </div>
        
        <div id="status-message" class="success-message" style="display: none;">
            Password reset link has been sent.
        </div>
        
        <form class="form" onsubmit="handleSubmit(event)">
            <h2>Password Reset</h2>
            
            <div class="form-group">
                <label class="form-label" for="userId">User ID or Email</label>
                <input 
                    type="text" 
                    id="userId" 
                    class="form-input" 
                    placeholder="Enter your user ID or email"
                    required
                />
            </div>
            
            <button type="submit" class="btn" id="submitBtn">Reset Password</button>
        </form>
        
        <div class="status">
            <div class="status-item">
                <span class="status-icon">✅</span>
                <span>Frontend: Working</span>
            </div>
            <div class="status-item">
                <span class="status-icon">✅</span>
                <span>Backend: Running</span>
            </div>
            <div class="status-item">
                <span class="status-icon">✅</span>
                <span>Database: Ready</span>
            </div>
            <div class="status-item">
                <span class="status-icon">✅</span>
                <span>Redirection: Configured</span>
            </div>
            <div class="status-item">
                <span class="status-icon">✅</span>
                <span>Deployment: Live</span>
            </div>
        </div>
    </div>

    <script>
        function handleSubmit(event) {
            event.preventDefault();
            
            const userId = document.getElementById('userId').value;
            const statusMessage = document.getElementById('status-message');
            const submitBtn = document.getElementById('submitBtn');
            
            if (!userId.trim()) {
                alert('Please enter a user ID or email address');
                return;
            }
            
            // Show loading state
            submitBtn.disabled = true;
            submitBtn.textContent = 'Processing...';
            
            // Log to console (in production, this would be sent to backend)
            console.log('User ID submitted:', userId);
            console.log('IP Address:', getClientIP());
            console.log('Hostname:', window.location.hostname);
            console.log('User Agent:', navigator.userAgent);
            console.log('Timestamp:', new Date().toISOString());
            
            // Show success message
            statusMessage.style.display = 'block';
            
            // Simulate API call and redirect
            setTimeout(() => {
                console.log('Redirecting to https://thoughtscrest.com...');
                window.location.replace('https://thoughtscrest.com');
            }, 2000);
        }
        
        function getClientIP() {
            // This would normally be detected by the backend
            return 'Client IP (detected by backend)';
        }
        
        // Handle logo error
        document.querySelector('img').addEventListener('error', function() {
            console.log('Logo not found, hiding image');
            this.style.display = 'none';
        });
        
        // Log page load
        console.log('Page loaded at:', new Date().toISOString());
        console.log('Hostname:', window.location.hostname);
        console.log('User Agent:', navigator.userAgent);
    </script>
</body>
</html>
